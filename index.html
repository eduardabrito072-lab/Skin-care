<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skincare Ritual</title>

<link href="https://fonts.googleapis.com/css2?family=Lora&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
:root {
  --terracota:#9C6B5A;
  --terracota-med:#C49A8A;
  --terracota-clr:#E8D0C8;
  --bege-quente:#EDE0D8;
  --bege-suave:#FAF5F2;
  --marrom:#5C3D2E;
}

body{
  font-family:'Lora',serif;
  background:var(--bege-suave);
  margin:0;
}

.header{
  text-align:center;
  padding:25px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:var(--bege-quente);
}

.tab{
  text-align:center;
  padding:10px;
  cursor:pointer;
  font-size:12px;
}

.tab.active{
  color:var(--terracota);
  font-weight:bold;
}

.content{
  display:none;
  padding:20px;
}

.content.active{
  display:block;
}

.step{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.step.done{
  text-decoration:line-through;
  opacity:0.6;
}

input{
  width:100%;
}
</style>
</head>

<body>

<div class="header">
<h1>Skincare Ritual</h1>
<p id="textoManha">Banho ~12:00 · rotina após banho ✨</p>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('manha',this)">☀️ Manhã</div>
<div class="tab" onclick="showTab('virilha',this)">✿ Virilha</div>
<div class="tab" onclick="showTab('noite',this)">🌙 Noite</div>
<div class="tab" onclick="showTab('config',this)">⚙️ Config</div>
</div>

<!-- MANHÃ -->
<div class="content active" id="tab-manha">

<div class="step" onclick="toggle(this)">Limpeza do rosto</div>
<div class="step" onclick="toggle(this)">Gel anti-oleosidade</div>
<div class="step" onclick="toggle(this)">Sérum</div>
<div class="step" onclick="toggle(this)">Protetor solar</div>

</div>

<!-- VIRILHA -->
<div class="content" id="tab-virilha">

<div class="step" onclick="toggle(this)">Sabonete salicílico</div>
<div class="step" onclick="toggle(this)">Gel</div>
<div class="step" onclick="toggle(this)">Sérum</div>

</div>

<!-- NOITE -->
<div class="content" id="tab-noite">

<div class="step" onclick="toggle(this)">Remover maquiagem</div>
<div class="step" onclick="toggle(this)">Limpeza</div>
<div class="step" onclick="toggle(this)">Hidratante</div>

</div>

<!-- CONFIG -->
<div class="content" id="tab-config">

<h3>Personalizar</h3>

<label>Horário do banho</label>
<input type="time" id="hora">

<label>Produto rosto</label>
<input type="text" id="rosto">

<label>Gel</label>
<input type="text" id="gel">

<button onclick="salvar()">Salvar</button>

</div>

<script>

function showTab(id,el){
document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

document.getElementById('tab-'+id).classList.add('active');
el.classList.add('active');
}

function toggle(el){
el.classList.toggle('done');
}

function salvar(){
let hora=document.getElementById('hora').value;
let rosto=document.getElementById('rosto').value;
let gel=document.getElementById('gel').value;

localStorage.setItem('hora',hora);
localStorage.setItem('rosto',rosto);
localStorage.setItem('gel',gel);

carregar();
}

function carregar(){
let hora=localStorage.getItem('hora');
let rosto=localStorage.getItem('rosto');
let gel=localStorage.getItem('gel');

if(hora){
document.getElementById('textoManha').innerText="Banho ~"+hora+" · rotina após banho ✨";
}

if(rosto){
document.querySelector('#tab-manha .step').innerText=rosto;
}

if(gel){
document.querySelectorAll('.step')[1].innerText=gel;
}

document.getElementById('hora').value=hora||"";
document.getElementById('rosto').value=rosto||"";
document.getElementById('gel').value=gel||"";
}

window.onload=carregar;

</script>

</body>
</html>
