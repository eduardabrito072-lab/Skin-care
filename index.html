<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skincare Ritual</title>

<style>
body{
  font-family: Arial;
  background:#FAF5F2;
  margin:0;
}

.header{
  text-align:center;
  padding:20px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:#EDE0D8;
}

.tab{
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  font-weight:bold;
  color:#9C6B5A;
}

.content{
  display:none;
  padding:20px;
}

.content.active{
  display:block;
}

.step{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.step.done{
  text-decoration:line-through;
  opacity:0.6;
}

.reset{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Skincare Ritual</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('manha',this)">☀️ Manhã</div>
<div class="tab" onclick="showTab('noite',this)">🌙 Noite</div>
<div class="tab" onclick="showTab('virilha',this)">✿ Virilha</div>
</div>

<!-- MANHÃ -->
<div class="content active" id="tab-manha">

<div class="step" onclick="toggle(this,'manha',0)">Limpeza do rosto</div>
<div class="step" onclick="toggle(this,'manha',1)">Gel anti-oleosidade</div>
<div class="step" onclick="toggle(this,'manha',2)">Sérum</div>
<div class="step" onclick="toggle(this,'manha',3)">Protetor solar</div>

<button class="reset" onclick="resetTab('manha')">Resetar</button>

</div>

<!-- NOITE -->
<div class="content" id="tab-noite">

<div class="step" onclick="toggle(this,'noite',0)">Remover maquiagem</div>
<div class="step" onclick="toggle(this,'noite',1)">Limpeza</div>
<div class="step" onclick="toggle(this,'noite',2)">Hidratante</div>

<button class="reset" onclick="resetTab('noite')">Resetar</button>

</div>

<!-- VIRILHA -->
<div class="content" id="tab-virilha">

<div class="step" onclick="toggle(this,'virilha',0)">Sabonete</div>
<div class="step" onclick="toggle(this,'virilha',1)">Gel</div>
<div class="step" onclick="toggle(this,'virilha',2)">Sérum</div>

<button class="reset" onclick="resetTab('virilha')">Resetar</button>

</div>

<script>

// trocar abas
function showTab(id, el){
document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

document.getElementById('tab-'+id).classList.add('active');
el.classList.add('active');
}

// marcar passo + salvar automático
function toggle(el, tabId, index){
el.classList.toggle('done');

const key = tabId + '-' + index;

if(el.classList.contains('done')){
localStorage.setItem(key, 'true');
}else{
localStorage.removeItem(key);
}
}

// carregar tudo ao abrir
function carregar(){
document.querySelectorAll('.content').forEach(tab=>{
const tabId = tab.id.replace('tab-','');

tab.querySelectorAll('.step').forEach((step,index)=>{
const key = tabId + '-' + index;

if(localStorage.getItem(key)){
step.classList.add('done');
}
});
});
}

// resetar aba
function resetTab(tabId){
const tab = document.getElementById('tab-'+tabId);

tab.querySelectorAll('.step').forEach((step,index)=>{
step.classList.remove('done');
localStorage.removeItem(tabId+'-'+index);
});
}

// iniciar
window.onload = carregar;

</script>

</body>
</html>
